  <link rel="stylesheet" href="_ds/re-do-mi-design-system-e4680b52-dbb9-4e7a-84da-ba1b58bcba54/tokens/colors.css">

  <script src="screens/data.js"></script>
  <script src="screens/store.js"></script>
  <script src="screens/home.js"></script>
  <script src="screens/board.js"></script>
  <script src="screens/designers.js"></script>
  <script src="screens/about.js"></script>
  <script src="screens/products.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    * { -webkit-font-smoothing: antialiased; }
    :root {
      --color-eucalyptus: #E8B500;
      --color-eucalyptus-hover: #C99A00;
      --accent: #E8B500;
      --accent-hover: #C99A00;
      --text-accent: #8A6D00;
      --text-on-accent: #1A1A1A;
      --color-sage: #FBF1CC;
      --surface-sage: #FBF1CC;
      --surface-tag: #FBF1CC;
    }
  </style>
</helmet>
<div style="background:#fff; min-height:100vh;">
  <x-import component-from-global-scope="{{ screenGlobal }}" from="./screens/screens.jsx"
            go="{{ go }}" open-login="{{ openLogin }}" authed="{{ authed }}" params="{{ params }}"
            hint-size="100%,100%"></x-import>
  <sc-if value="{{ loginOpen }}" hint-placeholder-val="{{ false }}">
    <x-import component-from-global-scope="RDM_LoginGate" from="./screens/screens.jsx"
              subtitle="{{ loginSubtitle }}" on-close="{{ closeLogin }}" on-submit="{{ submitLogin }}"
              hint-size="100%,100%"></x-import>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1024},&quot;startRoute&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;products&quot;,&quot;designers&quot;,&quot;designer&quot;,&quot;board&quot;,&quot;about&quot;,&quot;agb&quot;,&quot;postcreate&quot;,&quot;postlive&quot;,&quot;dashboard&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;startAuthed&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  state = { route: null, authed: null, params: {}, loginOpen: false, loginSubtitle: "", pending: null };

  go = (route, params) => {
    if (route === "__logout") {
      this.setState({ authed: false, route: "home", params: {} });
      try { window.scrollTo(0, 0); } catch (e) {}
      return;
    }
    this.setState({ route, params: params || {} });
    try { window.scrollTo(0, 0); } catch (e) {}
  };

  openLogin = (subtitle, successRoute) => {
    this.setState({ loginOpen: true, loginSubtitle: subtitle || "um fortzufahren", pending: successRoute || "dashboard" });
  };

  closeLogin = () => this.setState({ loginOpen: false });

  submitLogin = () => {
    this.setState({ authed: true, loginOpen: false });
  };

  renderVals() {
    const route = this.state.route ?? (this.props.startRoute || "home");
    const authed = this.state.authed ?? (this.props.startAuthed || false);
    const map = {
      home: "RDM_Home",
      products: "RDM_Shop",
      designers: "RDM_Designers",
      designer: "RDM_Designer",
      board: "RDM_Board",
      about: "RDM_About",
      agb: "RDM_AGB",
      postcreate: "RDM_PostCreate",
      postlive: "RDM_PostLive",
      dashboard: "RDM_Dashboard",
    };
    return {
      screenGlobal: map[route] || "RDM_Home",
      go: this.go,
      openLogin: this.openLogin,
      authed: authed,
      params: this.state.params || {},
      loginOpen: this.state.loginOpen,
      loginSubtitle: this.state.loginSubtitle,
      closeLogin: this.closeLogin,
      submitLogin: this.submitLogin,
    };
  }
}
</script>
</body>
</html>
