<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="assets/fonts/fonts-local.css">
  <link rel="stylesheet" href="_ds/re-do-mi-design-system-e4680b52-dbb9-4e7a-84da-ba1b58bcba54/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/re-do-mi-design-system-e4680b52-dbb9-4e7a-84da-ba1b58bcba54/tokens/colors.css">
  <link rel="stylesheet" href="_ds/re-do-mi-design-system-e4680b52-dbb9-4e7a-84da-ba1b58bcba54/tokens/typography.css">
  <link rel="stylesheet" href="_ds/re-do-mi-design-system-e4680b52-dbb9-4e7a-84da-ba1b58bcba54/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/re-do-mi-design-system-e4680b52-dbb9-4e7a-84da-ba1b58bcba54/tokens/base.css">
  <link rel="stylesheet" href="_ds/re-do-mi-design-system-e4680b52-dbb9-4e7a-84da-ba1b58bcba54/styles.css">
  <script src="_ds/re-do-mi-design-system-e4680b52-dbb9-4e7a-84da-ba1b58bcba54/_ds_bundle.js"></script>
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
    .sc-placeholder { border-color: transparent !important; background: transparent !important; box-shadow: none !important; }
    @view-transition { navigation: auto; }
  </style>
</helmet>
<div style="background: var(--white); min-height: 100vh; padding-top: var(--rdm-header-h, 104px);">

  <dc-import name="Header" active="products" hint-size="100%,104px"></dc-import>

  <!-- ════════ HEADING ════════ -->
  <section style="max-width: 1440px; margin: 0 auto; padding: 72px 64px 0;">
    <div style="display: flex; flex-direction: column; gap: 18px; max-width: 640px;">
      <span style="font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 1.98px; text-transform: uppercase; color: var(--medium);">Produkte</span>
      <h1 style="margin: 0; font-family: var(--font-display); font-weight: 700; font-size: 56px; line-height: 1.02; letter-spacing: -0.4px; text-transform: uppercase; color: var(--ink);">Alle Produkte</h1>
      <p style="margin: 0; font-family: var(--font-body); font-style: italic; font-weight: 300; font-size: 18px; color: var(--medium);">Kuratierte Upcycling-Kreationen aus der Schweiz.</p>
    </div>
    <sc-if value="{{ searchActive }}" hint-placeholder-val="{{ false }}">
      <div style="display: inline-flex; align-items: center; gap: 14px; margin-top: 28px; padding: 12px 14px 12px 18px; background: var(--surface-alt); border: 1px solid var(--border-light); border-radius: 2px;">
        <span style="font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted);">Suche</span>
        <span style="font-family: var(--font-body); font-weight: 300; font-size: 15px; color: var(--ink);">„{{ searchTerm }}"</span>
        <button onClick="{{ clearSearch }}" aria-label="Suche zurücksetzen" style="display: inline-flex; align-items: center; gap: 6px; background: var(--white); border: 1px solid var(--border-light); border-radius: 2px; padding: 6px 10px; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink);" style-hover="background: var(--ink); color: var(--white);">× Zurücksetzen</button>
      </div>
    </sc-if>
  </section>

  <!-- ════════ BODY ════════ -->
  <div style="max-width: 1440px; margin: 0 auto; padding: 40px 64px 112px; display: grid; grid-template-columns: 248px 1fr; gap: 56px; align-items: start;">

    <!-- ── Sidebar ── -->
    <aside style="position: sticky; top: calc(var(--rdm-header-h, 104px) + 20px); display: flex; flex-direction: column;">
      <div style="display: flex; align-items: center; gap: 10px; padding-bottom: 20px; margin-bottom: 28px; border-bottom: 1px solid var(--ink);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="1.6" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"></line><circle cx="9" cy="8" r="2.4" fill="var(--white)"></circle><line x1="4" y1="16" x2="20" y2="16"></line><circle cx="15" cy="16" r="2.4" fill="var(--white)"></circle></svg>
        <span style="font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--ink);">Filter</span>
      </div>

      <sc-for list="{{ filterGroups }}" as="g" hint-placeholder-count="3">
        <div style="display: flex; flex-direction: column; gap: 4px; padding-bottom: 28px; margin-bottom: 28px; border-bottom: 1px solid var(--border-light);">
          <span style="font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--ink); margin-bottom: 10px;">{{ g.title }}</span>
          <sc-for list="{{ g.options }}" as="opt" hint-placeholder-count="5">
            <button onClick="{{ opt.onClick }}" style="display: flex; align-items: center; gap: 12px; background: none; border: none; padding: 7px 0; cursor: pointer; text-align: left; width: 100%;">
              <sc-if value="{{ opt.checked }}" hint-placeholder-val="{{ false }}">
                <span style="flex: none; width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--ink); display: inline-flex; align-items: center; justify-content: center;"><span style="width: 8px; height: 8px; border-radius: 50%; background: var(--brand-yellow);"></span></span>
              </sc-if>
              <sc-if value="{{ opt.unchecked }}" hint-placeholder-val="{{ true }}">
                <span style="flex: none; width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border-light);"></span>
              </sc-if>
              <span style="font-family: var(--font-body); font-weight: 300; font-size: 16px; color: var(--ink);">{{ opt.label }}</span>
            </button>
          </sc-for>
        </div>
      </sc-for>

      <button onClick="{{ toggleFavOnly }}" style="display: flex; align-items: center; gap: 12px; background: none; border: none; padding: 2px 0 24px; cursor: pointer; text-align: left; width: 100%;">
        <sc-if value="{{ favOnly }}" hint-placeholder-val="{{ false }}">
          <span style="flex: none; width: 18px; height: 18px; border-radius: 3px; background: var(--ink); display: inline-flex; align-items: center; justify-content: center; color: var(--white); font-size: 12px;">✓</span>
        </sc-if>
        <sc-if value="{{ favOnlyOff }}" hint-placeholder-val="{{ true }}">
          <span style="flex: none; width: 18px; height: 18px; border-radius: 3px; border: 1.5px solid var(--border-light);"></span>
        </sc-if>
        <span style="font-family: var(--font-body); font-weight: 300; font-size: 16px; color: var(--ink);">Nur Favoriten</span>
      </button>

      <sc-if value="{{ activeFilters }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ reset }}" style="align-self: flex-start; background: none; border: none; padding: 0; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--medium); text-decoration: underline; text-underline-offset: 4px;">Filter zurücksetzen</button>
      </sc-if>
    </aside>

    <!-- ── Main ── -->
    <div style="display: flex; flex-direction: column;">
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; padding-bottom: 32px; border-bottom: 1px solid var(--border-light); margin-bottom: 40px;">
        <span style="font-family: var(--font-body); font-style: italic; font-weight: 300; font-size: 16px; color: var(--medium);">{{ countLabel }}</span>
        <div style="position: relative;">
          <button onClick="{{ toggleSort }}" onBlur="{{ closeSortSoon }}" style="display: inline-flex; align-items: center; justify-content: space-between; gap: 24px; min-width: 220px; background: var(--white); border: 1px solid var(--border-light); border-radius: 2px; padding: 12px 16px; cursor: pointer; font-family: var(--font-body); font-weight: 300; font-size: 15px; color: var(--ink);">{{ sortValue }}<span style="color: var(--muted); font-size: 12px;">▾</span></button>
          <sc-if value="{{ sortOpen }}" hint-placeholder-val="{{ false }}">
            <div style="position: absolute; top: calc(100% + 6px); right: 0; min-width: 220px; background: var(--white); border: 1px solid var(--border-light); border-radius: 2px; box-shadow: 0 8px 24px rgba(26,26,26,0.10); z-index: 20; overflow: hidden;">
              <sc-for list="{{ sortOptions }}" as="s" hint-placeholder-count="4">
                <button onMouseDown="{{ s.onClick }}" style="display: block; width: 100%; text-align: left; background: var(--white); border: none; padding: 11px 16px; cursor: pointer; font-family: var(--font-body); font-weight: 300; font-size: 15px; color: var(--ink);" style-hover="background: var(--surface-alt);">{{ s.label }}</button>
              </sc-for>
            </div>
          </sc-if>
        </div>
      </div>

      <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
        <div style="padding: 80px 0; text-align: center; display: flex; flex-direction: column; gap: 16px; align-items: center;">
          <span style="font-family: var(--font-serif); font-style: italic; font-size: 30px; color: var(--ink);">Nichts gefunden</span>
          <p style="margin: 0; font-family: var(--font-body); font-weight: 300; font-size: 16px; color: var(--medium);">Passe die Filter an, um mehr Kreationen zu sehen.</p>
          <x-import component-from-global-scope="ReDoMiDesignSystem_e4680b.Button" variant="ghost" onClick="{{ reset }}" hint-size="auto,46px">Filter zurücksetzen</x-import>
        </div>
      </sc-if>

      <sc-if value="{{ hasItems }}" hint-placeholder-val="{{ true }}">
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); column-gap: 32px; row-gap: 56px;">
          <sc-for list="{{ list }}" as="p" hint-placeholder-count="9">
            <div style="position: relative;">
              <button onClick="{{ p.toggleFav }}" aria-label="Merken" style="position: absolute; top: 12px; right: 12px; z-index: 5; width: 36px; height: 36px; border-radius: 50%; background: var(--white); border: 1px solid var(--border-light); display: inline-flex; align-items: center; justify-content: center; cursor: pointer;">
                <sc-if value="{{ p.isFav }}" hint-placeholder-val="{{ false }}">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--brand-yellow)" stroke="var(--ink)" stroke-width="1.4" stroke-linejoin="round"><path d="M12 20.5 4.2 12.9a4.6 4.6 0 0 1 6.5-6.5l1.3 1.3 1.3-1.3a4.6 4.6 0 0 1 6.5 6.5L12 20.5Z"></path></svg>
                </sc-if>
                <sc-if value="{{ p.notFav }}" hint-placeholder-val="{{ true }}">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="1.5" stroke-linejoin="round"><path d="M12 20.5 4.2 12.9a4.6 4.6 0 0 1 6.5-6.5l1.3 1.3 1.3-1.3a4.6 4.6 0 0 1 6.5 6.5L12 20.5Z"></path></svg>
                </sc-if>
              </button>
              <x-import component-from-global-scope="ReDoMiDesignSystem_e4680b.ProductCard" image="{{ p.img }}" category="{{ p.catUpper }}" title="{{ p.title }}" designer="{{ p.designer }}" price="{{ p.priceLabel }}" onClick="{{ p.open }}" hint-size="100%,360px"></x-import>
            </div>
          </sc-for>
        </div>
      </sc-if>
    </div>
  </div>

  <x-import component-from-global-scope="ReDoMiDesignSystem_e4680b.Footer" hint-size="100%,560px"></x-import>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1024}}">
class Component extends DCLogic {
  state = { cat: "Alle", mat: "Alle", city: "Alle", sort: "Neueste zuerst", sortOpen: false, favOnly: false, favs: [], q: "", products: [], loaded: false };

  componentDidMount() {
    try {
      const f = JSON.parse(localStorage.getItem("rdm_favs") || "[]");
      if (Array.isArray(f)) this.setState({ favs: f });
    } catch (e) {}
    try {
      const params = new URLSearchParams(location.search);
      const q = params.get("q") || sessionStorage.getItem("rdm_search") || "";
      if (q) this.setState({ q: q });
      sessionStorage.removeItem("rdm_search");
      if (params.get("fav") === "1" || sessionStorage.getItem("rdm_show_favs") === "1") this.setState({ favOnly: true });
      sessionStorage.removeItem("rdm_show_favs");
    } catch (e) {}
    import("./shop-data.js").then((mod) => {
      const products = mod.PRODUCTS.map((p) => ({ ...p, designer: mod.designerName(p.designerId) }));
      this.setState({ products: products, loaded: true });
    }).catch(() => this.setState({ loaded: true }));
  }

  openProduct = (id) => {
    try { sessionStorage.setItem("rdm_product", id); } catch (e) {}
    try { location.href = "produkt.dc.html?id=" + encodeURIComponent(id); } catch (e) {}
  };

  toggleFav = (title) => {
    this.setState((s) => {
      const favs = s.favs.includes(title) ? s.favs.filter((t) => t !== title) : [...s.favs, title];
      try { localStorage.setItem("rdm_favs", JSON.stringify(favs)); } catch (e) {}
      try { window.dispatchEvent(new CustomEvent("rdm-fav-changed", { detail: { count: favs.length } })); } catch (e) {}
      return { favs };
    });
  };

  renderVals() {
    const PRODUCTS = this.state.products;
    const CATEGORIES = ["Alle", "Mode", "Kunst", "Möbel", "Schmuck", "Sonstiges"];
    const MATERIALS = ["Alle", "Glas", "Holz", "Metall", "Textil"];
    const CITIES = ["Alle", "Zürich", "Basel", "Bern", "Luzern", "Genf"];
    const SORTS = ["Neueste zuerst", "Preis aufsteigend", "Preis absteigend", "Name A–Z"];

    const { cat, mat, city, sort, favOnly, favs, q } = this.state;

    // Suchbegriff → optionale Synonyme auf Kategorien/Material
    const ql = (q || "").trim().toLowerCase();
    const SYN = {
      "lampe": "Möbel", "lampen": "Möbel", "leuchte": "Möbel", "leuchten": "Möbel", "licht": "Möbel",
      "sofa": "Möbel", "stuhl": "Möbel", "tisch": "Möbel", "möbel": "Möbel", "hocker": "Möbel", "bett": "Möbel",
      "kleid": "Mode", "kleider": "Mode", "mode": "Mode", "tasche": "Mode", "sneaker": "Mode",
      "schmuck": "Schmuck", "ohrringe": "Schmuck",
      "kunst": "Kunst", "vase": "Sonstiges", "objekt": "Sonstiges", "objekte": "Sonstiges", "karaffe": "Sonstiges",
      "holz": "Holz", "textil": "Textil", "metall": "Metall", "glas": "Glas",
    };
    const synHit = ql ? SYN[ql] : null;

    const matchesQuery = (p) => {
      if (!ql) return true;
      if (synHit && (p.cat === synHit || p.mat === synHit)) return true;
      const hay = (p.title + " " + p.designer + " " + p.cat + " " + p.mat + " " + p.city).toLowerCase();
      return hay.includes(ql);
    };

    let list = PRODUCTS.filter((p) =>
      (cat === "Alle" || p.cat === cat) &&
      (mat === "Alle" || p.mat === mat) &&
      (city === "Alle" || p.city === city) &&
      (!favOnly || favs.includes(p.title)) &&
      matchesQuery(p));
    if (sort === "Preis aufsteigend") list = [...list].sort((a, b) => a.price - b.price);
    else if (sort === "Preis absteigend") list = [...list].sort((a, b) => b.price - a.price);
    else if (sort === "Name A–Z") list = [...list].sort((a, b) => a.title.localeCompare(b.title));

    const mkGroup = (title, options, value, key) => ({
      title,
      options: options.map((o) => ({
        label: o, checked: value === o, unchecked: value !== o,
        onClick: () => this.setState({ [key]: o }),
      })),
    });

    return {
      filterGroups: [
        mkGroup("Kategorie", CATEGORIES, cat, "cat"),
        mkGroup("Material", MATERIALS, mat, "mat"),
        mkGroup("Stadt", CITIES, city, "city"),
      ],
      list: list.map((p) => ({
        ...p,
        catUpper: p.cat.toUpperCase(),
        priceLabel: "CHF " + p.price,
        isFav: favs.includes(p.title),
        notFav: !favs.includes(p.title),
        toggleFav: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.toggleFav(p.title); },
        open: () => this.openProduct(p.id),
      })),
      countLabel: list.length + (list.length === 1 ? " Produkt" : " Produkte"),
      isEmpty: this.state.loaded && list.length === 0,
      hasItems: !this.state.loaded || list.length > 0,
      favOnly: favOnly,
      favOnlyOff: !favOnly,
      toggleFavOnly: () => this.setState((s) => ({ favOnly: !s.favOnly })),
      activeFilters: cat !== "Alle" || mat !== "Alle" || city !== "Alle" || favOnly || !!ql,
      reset: () => this.setState({ cat: "Alle", mat: "Alle", city: "Alle", favOnly: false, q: "" }),
      searchActive: !!ql,
      searchTerm: q,
      clearSearch: () => this.setState({ q: "" }),
      sortValue: sort,
      sortOpen: this.state.sortOpen,
      toggleSort: () => this.setState((s) => ({ sortOpen: !s.sortOpen })),
      closeSortSoon: () => setTimeout(() => this.setState({ sortOpen: false }), 140),
      sortOptions: SORTS.map((s) => ({ label: s, onClick: () => this.setState({ sort: s, sortOpen: false }) })),
    };
  }
}
</script>
</body>
</html>
